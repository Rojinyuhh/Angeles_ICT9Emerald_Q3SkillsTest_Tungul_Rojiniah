<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Q3 Skills Test</title>
    <link rel="stylesheet" href="style.css">
    
    <style>

        body{
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            background-color: #e5ecf1;
        }
        nav{
            background-color: #00273d;
            padding: 15px 0;
            text-align: center;
        }

        .container-fluid{
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            position: relative;
        }

        .navbar-name{
            display: block;
            font-size: 25px;
            font-weight: bold;
            color: #eaeef1;
            text-decoration: none;
        }

        .nav-links{
            display: flex;
            gap: 25px;
            text-align: center;
        }

        .nav-link{
            color: #eaeef1;
            text-decoration: none;
            font-size: 20px;
        }
     
        .container {
            margin-top: 5rem;
            margin-bottom: 3.9rem;
            text-align: center;
            display: flex;
            align-items: stretch;
            justify-content: center;
            gap: 0;
        }

        .photo img {
            margin-top: 50px;
            margin-bottom: 50px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .signup form {
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
        }

        .signup form label {
            display: inline-block;
            margin-bottom: 13px;
            color: #00273d;
            text-align: left;
            font-size: 20px;
        }

        .form-label label {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #eaeef1;
        }

        button {
            background-color: #00273d;
            color: #eaeef1;
            border: none;
            padding: 0.7rem 2rem;
            border-radius: 5px;
            width: 65%;
            font-size: 17px;
            display: block;
            margin: auto;
        }

        button:hover {
            background-color: #093752;
            transition: 0.5s;
        }

        button:active {
            background-color: #00273d;
            transition: 0.5s;
            transform: scale(0.95);
            color: #282a28;
        }

        h2 {
            color: #eaeef1;
            font-weight: bold;
            font-size: 35px;
            margin-top: 1rem;
        }

        h1 {
            color: #00273d;
            font-weight: bold;
            font-size: 40px;
            margin-top: 1rem;
        }

        h3 {
            color: #00273d;
            font-size: 30px;
        }
        p {
            color: #00273d;
            font-size: 20px;
        }

        .photo label {
            display: inline-block;
            width: 200px;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            color: rgb(255, 255, 255);
            font-size: 20px;
        }
        #input-pic {
            display: none;
        }
        label[for="input-pic"] {
            background-color: #7798af;
            color: #eaeef1;
            padding: 10px 18px;
            border-radius: 6px 0 0 6px;
            cursor: pointer;
            font-size: 16px;
        }
        label[for="input-pic"]:hover {
            background-color: #7798af;
            transition: 0.3s;
        }
        label[for="input-pic"]:active {
            background-color: #546c7d;
            transition: 0.5s;
            transform: scale(0.95);
            color: #eaeef1;
        }

        #file-name{
            background: #00273d;
            color: #eaeef1;
            padding: 10px 18px;
            border-radius: 0 6px 6px 0;
            font-size: 16px;   
        }

        .name-row{
            display: flex;
            gap: 15px;
            width: 100%;
        }

        .name-field{
            flex: 1;
        }

        .photo{
            background-color: #0d3247;
            padding: 30px;
            width: 425px;
            border-radius: 15px 0 0 15px;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.5);
        }

        .signup{
            background-color: white;
            padding: 30px;
            width: 525px;
            border-radius: 0 15px 15px 0;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.5);
        }

    </style>
</head>
<body>

   <nav class="navbar">
        <div class="container-fluid">
            <a class="navbar-name" href="generator.html">Procrastinator Pro</a>

            <div class="nav-links">
                <a class="nav-link" href="home.html">Home</a>
                <a class="nav-link" href="generator.html">Generator</a>
                <a class="nav-link" href="index.html">Sign Up</a>
                <a class="nav-link" href="about.html">About</a>
            </div>
        </div>
    </nav>

<div class="container">
    <div class="photo">
            <h2>Upload Profile Picture</h2>
            <img src="images/signup/guest.png" class="rounded-circle" style="width: 200px; height: 200px;"id="profile-pic">
            <div class="upload-row" style="display: flex; align-items: center; justify-content: center;">
            <label for="input-pic">Update Photo</label>
            <span id="file-name">No File Chosen</span>
            </div>
            <input type="file" id="input-pic" accept="image/jpeg, image/png, image/jpg">
    </div> 

        <div class="signup">
                <h1>Sign Up</h1>
                <p>Please fill out all required fields in the sign up form. Once completed, click Submit.</p>

                <br>

                <form id="signupform">

                    <label for="email">Email:</label>
                    <input type="email" class="form-control" id="email" placeholder="Email" required>

                    <div class="name-row">
                        <div class="name-field">
                            <label for="firstname">First Name:</label>
                            <input type="text" class="form-control" id="firstname" placeholder="First Name" required>
                        </div>

                        <div class="name-field">
                            <label for="lastname">Last Name:</label>
                            <input type="text" class="form-control" id="lastname" placeholder="Last Name" required>
                        </div>
                    </div>

                    <label for="age">Age:</label>
                    <input type="number" class="form-control" id="age" placeholder="Age" required>

                    <label for="username">Username:</label>
                    <input type="text" class="form-control" id="username" placeholder="Username" required>

                    <label for="password">Password:</label>
                    <input type="password" class="form-control" id="password" placeholder="Password" required>

                    <br>

                    <div class="form-label">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">I accept the <a href="images/signup/Terms_of_Use&Privacy_Policy.pdf">Terms of Use and Privacy Policy</a></label>
                    </div>

                    <br>

                    <button type="submit" id="registerbtn">Submit</button>

                </form>
                
        </div>

           <script>

        const input = document.getElementById('input-pic');
        const fileName = document.getElementById('file-name');
        const profilePic = document.getElementById('profile-pic');
        
        input.addEventListener('change', function() {
            if(this.files && this.files[0]) {
                fileName.textContent = this.files[0].name;
                profilePic.src = URL.createObjectURL(this.files[0]);
            } else {
                fileName.textContent = "No file chosen";
                profilePic.src = "images/signup/guest.png";
            }
            });
        const registerbtn = document.getElementById('registerbtn');
        const signupform = document.getElementById('signupform');
        const termsCheckbox = document.getElementById('terms');
                    
            registerbtn.addEventListener('click', function(e) {
                e.preventDefault();
                        
                if (signupform.checkValidity() && termsCheckbox.checked) {
                    alert('Sign Up successful!');
                window.location.href = 'generator.html';
                } else {
                        alert('Please fill out all required fields and accept the terms.');
                }
            });
            </script>
    </div>

        <br>
        <br>

    <footer class="p-3 text-center" style="background-color:#00273d; color: #eaeef1; width: 100%;"> Tungul, Rojiniah | 9 - Emerald &copy; 2026
    </footer>

</body>
</html>
